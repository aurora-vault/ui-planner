name: Deploy UI Planner

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: server

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare server directories
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          script: |
            set -e
            echo "[deploy] prepare directories"
            mkdir -p /opt/projects/ui-planner/data/projects
            mkdir -p /opt/projects/ui-planner/docker/ui-planner

      - name: Upload project files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          source: "Dockerfile,.dockerignore,index.html,package.json,package-lock.json,postcss.config.js,tailwind.config.js,tsconfig.json,vite.config.ts,api/**,public/**,src/**,docker/ui-planner/docker-compose.yml"
          target: "/opt/projects/ui-planner"
          strip_components: 0

      - name: Rebuild and start on 52 server
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          script: |
            set -e
            echo "[deploy] enter project"
            cd /opt/projects/ui-planner
            echo "[deploy] docker compose build and up"
            docker compose -f docker/ui-planner/docker-compose.yml up -d --build --remove-orphans
            echo "[deploy] container status"
            docker ps --filter name=ui-planner
