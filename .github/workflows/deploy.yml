name: Deploy UI Planner

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: aurora
    if: github.actor == 'pxMan79'
    steps:
      - name: Sync and deploy
        run: |
          set -e
          cd /opt/projects/ui-planner
          git fetch --all --prune
          git reset --hard origin/main
          docker compose -f docker/ui-planner/docker-compose.yml up -d --build --remove-orphans
          docker ps --filter name=ui-planner
